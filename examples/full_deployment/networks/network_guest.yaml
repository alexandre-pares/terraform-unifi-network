---
# Guest Network
name: "Guest Network"
management_type: "GATEWAY"
vlan_id: 99
enable_cellular_backup: false
enable_mdns_forwarding: false
enable_isolation: false # Must be false if the Firewall Zone Id is "Hotspot"
enable_internet_access: true
ipv4_configuration:
  enable_auto_scale: true
  host_ip_address: "192.168.100.1"
  prefix_length: 24
